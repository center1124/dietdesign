<head>
<meta charset="UTF-8">

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

const C={
  bg:"#F6F3EE",card:"#FFFFFF",alt:"#FAF8F5",border:"#E8E2D8",
  accent:"#9B7651",accentL:"#EDE4D8",accentD:"#7A5C3A",
  text:"#2A2018",mid:"#7A6D62",light:"#B0A599",
  ok:"#5C8A68",danger:"#B85450",warn:"#C4924A",
  female:"#C47A8A",male:"#5A7A9B",
};

const COACH_PW = "coach1234";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz8LKermR-eSp23YxYKDsJHwh15jDfuadEXSCI62Als9qRwn6UazuBV1MI11VR6-Ok_/exec";

function getToday(){
  const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
const TODAY=getToday();

function normalizeDate(raw){
  const s=String(raw||"");
  return s.length>10?s.slice(0,10):s;
}

function formatDateKR(dateStr){
  const [y,m,d]=dateStr.split("-");
  return m+"월 "+d+"일";
}

function getDatesOfMonth(year,month){
  // month: 1-12
  const days=[];
  const d=new Date(year,month-1,1);
  while(d.getMonth()===month-1){
    days.push(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"));
    d.setDate(d.getDate()+1);
  }
  return days;
}

function getLast7Days(){
  return Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(6-i));
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  });
}

const TIME_OPTS=Array.from({length:48},(_,i)=>
  String(Math.floor(i/2)).padStart(2,"0")+":"+(i%2===0?"00":"30")
);

const DEFAULT_PROMPT=`당신은 다음 코칭 철학을 따르는 코치의 보조 AI입니다.

핵심 원칙:
- 체중 수치보다 식욕 안정감이 가장 중요한 지표입니다
- 음식을 줄이는 것이 아니라 충분히 먹는 방향입니다 (채소 100g + 밥 150~200g 기준)
- 식후 포만감이 충분히 느껴지고 오래 유지되는지가 핵심입니다
- 완벽한 실천보다 꾸준한 기록이 우선입니다
- 생리 주기에 따른 식욕 변화는 자연스러운 현상으로 바라봅니다

절대 금지:
- 칼로리, 단백질, 탄수화물, 지방 수치 언급 금지
- "덜 드세요", "줄이세요" 방향의 피드백 금지
- 체중 증가를 부정적으로 표현하는 것 금지`;

// ── API ───────────────────────────────────────────────────────────────────────
async function sheetGet(sheet){
  try{
    const r=await fetch(SCRIPT_URL+"?sheet="+encodeURIComponent(sheet));
    const d=await r.json();
    return d.data||[];
  }catch{return [];}
}

async function sheetWrite(sheet,row,values){
  try{
    await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({action:"write",sheet,row,values})});
    return true;
  }catch{return false;}
}

async function apiLoadMembers(){
  const rows=await sheetGet("members");
  return rows.filter(r=>r[0]).map(r=>({
    id:String(r[0]),name:String(r[1]),gender:String(r[2]),
    age:Number(r[3]),goal:String(r[4]||""),
    startWeight:Number(r[5]),targetWeight:Number(r[6]),
    pin:String(r[7]),memo:String(r[8]||""),personalPrompt:String(r[9]||""),
  }));
}

async function apiSaveMembers(members){
  for(let i=0;i<members.length;i++){
    const m=members[i];
    await sheetWrite("members",i+1,[m.id,m.name,m.gender,m.age,m.goal,m.startWeight,m.targetWeight,m.pin,m.memo,m.personalPrompt||""]);
  }
}

// 특정 회원의 모든 기록 로드 - 중복 행은 마지막 것만 사용
async function apiLoadRecords(memberId){
  const rows=await sheetGet("records");
  const result={};
  rows.filter(r=>String(r[0])===memberId).forEach(r=>{
    try{
      const date=normalizeDate(r[1]);
      if(date) result[date]=JSON.parse(String(r[2]));
    }catch{}
  });
  return result;
}

// 전체 회원 기록 로드
async function apiLoadAllRecords(memberIds){
  const rows=await sheetGet("records");
  const result={};
  memberIds.forEach(id=>{result[id]={};});
  rows.filter(r=>r[0]&&result[String(r[0])]!==undefined).forEach(r=>{
    try{
      const date=normalizeDate(r[1]);
      if(date) result[String(r[0])][date]=JSON.parse(String(r[2]));
    }catch{}
  });
  return result;
}

// 저장: 중복 행 모두 삭제 후 새로 추가 방식
// Apps Script 재배포 없이도 중복 문제 해결
async function apiSaveRecord(memberId,date,record){
  const rows=await sheetGet("records");
  // 같은 memberId + date인 행 모두 찾기
  const matchRows=[];
  rows.forEach((r,i)=>{
    if(String(r[0])===memberId&&normalizeDate(r[1])===date){
      matchRows.push(i+1);
    }
  });

  if(matchRows.length===0){
    // 새 행 추가
    await sheetWrite("records",rows.length+1,[memberId,date,JSON.stringify(record)]);
  } else {
    // 첫 번째 매칭 행에 덮어쓰기
    await sheetWrite("records",matchRows[0],[memberId,date,JSON.stringify(record)]);
    // 나머지 중복 행은 빈 값으로 클리어 (역순으로)
    for(let i=matchRows.length-1;i>=1;i--){
      await sheetWrite("records",matchRows[i],["","",""]);
    }
  }
}

async function callGemini(apiKey,prompt){
  try{
    const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+apiKey,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}]}),
    });
    const data=await res.json();
    const text=data.candidates?.[0]?.content?.parts?.[0]?.text||"{}";
    try{return JSON.parse(text.replace(/```json|```/g,"").trim());}
    catch{return {raw:text};}
  }catch{return null;}
}

// ── 공통 UI ───────────────────────────────────────────────────────────────────
const inputStyle={
  border:"1.5px solid #E8E2D8",borderRadius:8,padding:"9px 12px",
  fontSize:13,color:"#2A2018",background:"#fff",outline:"none",width:"100%",display:"block"
};

function KInput({value,onChange,placeholder,type="text",style={}}){
  const composing=useRef(false);
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current&&!composing.current){
      if(ref.current.value!==String(value??"")){
        ref.current.value=String(value??"");
      }
    }
  },[value]);
  return(
    <input ref={ref} type={type} defaultValue={value??""} placeholder={placeholder}
      onCompositionStart={()=>{composing.current=true;}}
      onCompositionEnd={e=>{composing.current=false;onChange(e.target.value);}}
      onChange={e=>{if(!composing.current)onChange(e.target.value);}}
      style={{...inputStyle,...style}}/>
  );
}

function Sel({value,onChange,options,placeholder}){
  return(
    <select value={value} onChange={e=>onChange(e.target.value)}
      style={{...inputStyle,color:value?C.text:C.light}}>
      {placeholder&&<option value="">{placeholder}</option>}
      {options.map(o=><option key={o} value={o}>{o}</option>)}
    </select>
  );
}

function Btn({children,onClick,variant="primary",size="md",disabled,full,style:sx={}}){
  const sz=size==="sm"?{padding:"5px 12px",fontSize:12}:{padding:"10px 20px",fontSize:14};
  const v={
    primary:{background:C.accent,color:"#fff",border:"none"},
    outline:{background:"transparent",color:C.accent,border:"1.5px solid "+C.accent},
    ghost:{background:"transparent",color:C.mid,border:"none"},
    danger:{background:C.danger,color:"#fff",border:"none"},
  };
  return(
    <button onClick={onClick} disabled={disabled}
      style={{...sz,...v[variant],borderRadius:8,cursor:disabled?"not-allowed":"pointer",
        fontWeight:600,opacity:disabled?0.5:1,width:full?"100%":undefined,...sx}}>
      {children}
    </button>
  );
}

function Tag({children,bg=C.accentL,color=C.accent}){
  return<span style={{background:bg,color,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{children}</span>;
}

function Card({children,style:sx={}}){
  return<div style={{background:C.card,borderRadius:14,border:"1px solid "+C.border,padding:18,...sx}}>{children}</div>;
}

function Spinner(){return<div style={{textAlign:"center",padding:48,color:C.light}}>불러오는 중...</div>;}

function Confirm({msg="삭제할까요?",onOk,onCancel}){
  return(
    <span style={{display:"inline-flex",gap:6,alignItems:"center"}}>
      <span style={{fontSize:12,color:C.danger}}>{msg}</span>
      <Btn size="sm" variant="danger" onClick={onOk}>확인</Btn>
      <Btn size="sm" variant="ghost" onClick={onCancel}>취소</Btn>
    </span>
  );
}

function Slider({label,value,onChange}){
  const color=value>=7?C.ok:value>=4?C.warn:C.danger;
  return(
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <span style={{fontSize:12,color:C.mid,minWidth:72}}>{label}</span>
      <input type="range" min={1} max={10} value={value}
        onChange={e=>onChange(Number(e.target.value))} style={{flex:1,accentColor:color}}/>
      <span style={{fontSize:14,fontWeight:800,color,minWidth:18,textAlign:"right"}}>{value}</span>
    </div>
  );
}

function calcSleepTotal(start,end){
  if(!start||!end)return "";
  const [sh,sm]=start.split(":").map(Number);
  const [eh,em]=end.split(":").map(Number);
  let mins=(eh*60+em)-(sh*60+sm);
  if(mins<0)mins+=1440;
  return Math.floor(mins/60)+"시간"+(mins%60>0?" "+mins%60+"분":"");
}

function SleepBar({start,end,total}){
  const toFrac=t=>{
    if(!t)return -1;
    const [h,m]=t.split(":").map(Number);
    let mins=h*60+m-21*60;
    if(mins<0)mins+=1440;
    return Math.min(mins/(12*60),1);
  };
  const sf=toFrac(start),ef=toFrac(end);
  return(
    <div>
      <div style={{position:"relative",height:10,background:C.alt,borderRadius:5,overflow:"hidden",border:"1px solid "+C.border}}>
        {sf>=0&&ef>sf&&<div style={{position:"absolute",left:sf*100+"%",width:(ef-sf)*100+"%",height:"100%",background:C.accent,opacity:0.75}}/>}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:11,color:C.mid}}>
        <span>취침 <b>{start||"-"}</b></span>
        <span>기상 <b>{end||"-"}</b></span>
        <span style={{color:C.accent,fontWeight:700}}>{total||"-"}</span>
      </div>
    </div>
  );
}

// ── 식사 폼 ───────────────────────────────────────────────────────────────────
function MealForm({initial,onSave,onCancel,label="추가"}){
  const [time,setTime]=useState(initial?.time||"");
  const [food,setFood]=useState(initial?.food||"");
  const [hunger,setHunger]=useState(initial?.hungerBefore||5);
  const [satiety,setSatiety]=useState(initial?.satietyAfter||7);
  const [photo,setPhoto]=useState(initial?.photo||null);
  const fileRef=useRef();
  const handlePhoto=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>setPhoto(ev.target.result);r.readAsDataURL(f);
  };
  return(
    <div style={{background:C.alt,borderRadius:10,padding:14,border:"1px solid "+C.border,marginBottom:10}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:10,marginBottom:10}}>
        <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>시간</div><Sel value={time} onChange={setTime} options={TIME_OPTS} placeholder="시간 선택"/></div>
        <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>먹은 음식</div><KInput value={food} onChange={setFood} placeholder="비빔밥, 된장국"/></div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
        <Slider label="식전 공복감" value={hunger} onChange={setHunger}/>
        <Slider label="식후 포만감" value={satiety} onChange={setSatiety}/>
      </div>
      <div style={{marginBottom:12}}>
        <input ref={fileRef} type="file" accept="image/*" onChange={handlePhoto} style={{display:"none"}}/>
        {photo
          ?<img src={photo} alt="" onClick={()=>fileRef.current?.click()} style={{width:72,height:72,objectFit:"cover",borderRadius:8,cursor:"pointer"}}/>
          :<Btn size="sm" variant="outline" onClick={()=>fileRef.current?.click()}>📷 사진</Btn>}
      </div>
      <div style={{display:"flex",gap:8}}>
        <Btn size="sm" onClick={()=>{if(!food.trim())return;onSave({time,food,hungerBefore:hunger,satietyAfter:satiety,photo});}}>{label}</Btn>
        <Btn size="sm" variant="ghost" onClick={onCancel}>취소</Btn>
      </div>
    </div>
  );
}

// ── 운동 폼 ───────────────────────────────────────────────────────────────────
function ExForm({initial,onSave,onCancel,label="추가"}){
  const [time,setTime]=useState(initial?.time||"");
  const [note,setNote]=useState(initial?.note||"");
  return(
    <div style={{background:C.alt,borderRadius:10,padding:14,border:"1px solid "+C.border,marginBottom:10}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:10,marginBottom:10}}>
        <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>시간</div><Sel value={time} onChange={setTime} options={TIME_OPTS} placeholder="시간 선택"/></div>
        <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>운동 내용</div><KInput value={note} onChange={setNote} placeholder="굿모닝 5x8, 달리기 3km"/></div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <Btn size="sm" onClick={()=>{if(!note.trim())return;onSave({time,note});}}>{label}</Btn>
        <Btn size="sm" variant="ghost" onClick={onCancel}>취소</Btn>
      </div>
    </div>
  );
}

// ── 기록 폼 (날짜 선택 포함) ──────────────────────────────────────────────────
function RecordForm({member,date,record,onSave,onDateChange}){
  const [weight,setWeight]=useState(String(record?.weight||""));
  const [waist,setWaist]=useState(String(record?.waist||""));
  const [sleepStart,setSleepStart]=useState(record?.sleep?.start||"");
  const [sleepEnd,setSleepEnd]=useState(record?.sleep?.end||"");
  const [toilet,setToilet]=useState(String(record?.toilet||""));
  const [period,setPeriod]=useState(record?.period||"");
  const [meals,setMeals]=useState(()=>record?.meals?JSON.parse(JSON.stringify(record.meals)):[]);
  const [exercise,setExercise]=useState(()=>record?.exercise?JSON.parse(JSON.stringify(record.exercise)):[]);
  const [addingMeal,setAddingMeal]=useState(false);
  const [editMealIdx,setEditMealIdx]=useState(null);
  const [delMealIdx,setDelMealIdx]=useState(null);
  const [addingEx,setAddingEx]=useState(false);
  const [editExIdx,setEditExIdx]=useState(null);
  const [delExIdx,setDelExIdx]=useState(null);
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);

  const total=calcSleepTotal(sleepStart,sleepEnd);

  const handleSave=async()=>{
    setSaving(true);
    await onSave(date,{
      weight:weight?parseFloat(weight):null,
      waist:waist?parseFloat(waist):null,
      sleep:{start:sleepStart,end:sleepEnd,total},
      toilet:toilet?parseInt(toilet):null,
      period:period||null,
      meals,exercise,
      coachComment:record?.coachComment||"",
    });
    setSaving(false);setSaved(true);
    setTimeout(()=>setSaved(false),2500);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* 날짜 선택 */}
      <div style={{display:"flex",alignItems:"center",gap:12,background:C.accentL,borderRadius:10,padding:"10px 16px"}}>
        <span style={{fontSize:13,fontWeight:700,color:C.accentD}}>📅 날짜</span>
        <input type="date" value={date} onChange={e=>onDateChange(e.target.value)}
          max={TODAY}
          style={{...inputStyle,width:"auto",flex:1,maxWidth:180,background:"transparent",border:"1.5px solid "+C.accent}}/>
        {date===TODAY&&<Tag>오늘</Tag>}
      </div>

      {record?.coachComment&&(
        <div style={{background:C.accentL,borderRadius:12,padding:"12px 16px",border:"1.5px solid "+C.accent+"40"}}>
          <div style={{fontSize:11,fontWeight:700,color:C.accent,marginBottom:6}}>코치 코멘트</div>
          <p style={{fontSize:13,color:C.text,lineHeight:1.7}}>{record.coachComment}</p>
        </div>
      )}

      {/* 신체 지표 */}
      <Card>
        <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>신체 지표</div>
        <div className="form2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>체중 (kg)</div><KInput value={weight} onChange={setWeight} placeholder="예: 65.5" type="number"/></div>
          <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>허리 둘레 (cm)</div><KInput value={waist} onChange={setWaist} placeholder="예: 80" type="number"/></div>
          <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>취침 시간</div><Sel value={sleepStart} onChange={setSleepStart} options={TIME_OPTS} placeholder="취침 시간 선택"/></div>
          <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>기상 시간</div><Sel value={sleepEnd} onChange={setSleepEnd} options={TIME_OPTS} placeholder="기상 시간 선택"/></div>
          <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>화장실 (횟수)</div><KInput value={toilet} onChange={setToilet} placeholder="예: 1" type="number"/></div>
          {member.gender==="female"&&(
            <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>생리 기록</div><KInput value={period} onChange={setPeriod} placeholder="예: D+2, D-7"/></div>
          )}
        </div>
        {sleepStart&&sleepEnd&&<SleepBar start={sleepStart} end={sleepEnd} total={total}/>}
      </Card>

      {/* 식사 기록 */}
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:14}}>🍽 식사 기록</div>
          <Btn size="sm" onClick={()=>{setAddingMeal(true);setEditMealIdx(null);}}>+ 추가</Btn>
        </div>
        {addingMeal&&(
          <MealForm onSave={m=>{setMeals(p=>[...p,m]);setAddingMeal(false);}} onCancel={()=>setAddingMeal(false)}/>
        )}
        {meals.map((m,i)=>(
          <div key={i}>
            {editMealIdx===i?(
              <MealForm initial={m}
                onSave={u=>{setMeals(p=>p.map((x,j)=>j===i?u:x));setEditMealIdx(null);}}
                onCancel={()=>setEditMealIdx(null)} label="수정 저장"/>
            ):(
              <div style={{background:C.alt,borderRadius:10,padding:"11px 14px",marginBottom:8,border:"1px solid "+C.border}}>
                <div style={{display:"flex",gap:10}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,color:C.light}}>{m.time}</div>
                    <div style={{fontSize:13,fontWeight:600,margin:"3px 0 5px"}}>{m.food}</div>
                    <div style={{display:"flex",gap:10}}>
                      <span style={{fontSize:11,color:C.mid}}>공복 <b style={{color:C.warn}}>{m.hungerBefore}</b></span>
                      <span style={{fontSize:11,color:C.mid}}>포만 <b style={{color:C.ok}}>{m.satietyAfter}</b></span>
                    </div>
                  </div>
                  {m.photo&&<img src={m.photo} alt="" style={{width:54,height:54,objectFit:"cover",borderRadius:8}}/>}
                </div>
                <div style={{display:"flex",gap:8,marginTop:8}}>
                  {delMealIdx===i

// ── 주간/월간 테이블 (코치) ───────────────────────────────────────────────────
function RecordTable({member,records,dates,onUpdate,showPhotoModal}){
  const DAY_KR=["일","월","화","수","목","금","토"];
  const [editComment,setEditComment]=useState(null);
  const [commentDraft,setCommentDraft]=useState("");
  const [savingC,setSavingC]=useState(false);

  const saveComment=async date=>{
    setSavingC(true);
    const rec=records[date]||{};
    await onUpdate(date,{...rec,coachComment:commentDraft});
    setEditComment(null);setSavingC(false);
  };

  const rows=[
    {label:"수면",render:r=>r?.sleep?.total?<span style={{fontSize:11,fontWeight:700}}>{r.sleep.total}</span>:null},
    {label:"체중",render:(r,i,allDates)=>{
      if(!r?.weight)return null;
      const prevDate=allDates[i-1];

      const diff=prev?(r.weight-prev).toFixed(1):null;
      return<div style={{textAlign:"center"}}>
        <div style={{fontSize:13,fontWeight:800,color:C.accent}}>{r.weight}</div>

      </div>;
    }},
    {label:"허리",render:r=>r?.waist?<span style={{fontSize:11}}>{r.waist}</span>:null},
    {label:"화장실",render:r=>r?.toilet!=null?<span style={{fontSize:11}}>{r.toilet}</span>:null},
    ...(member.gender==="female"?[{label:"생리",render:r=>r?.period?<span style={{fontSize:10,color:C.female}}>{r.period}</span>:null}]:[]),
    {label:"포만감",render:r=>{
      const vals=r?.meals?.map(m=>m.satietyAfter).filter(Boolean)||[];
      if(!vals.length)return null;
      const avg=(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
      return<span style={{fontSize:13,fontWeight:800,color:parseFloat(avg)>=7?C.ok:parseFloat(avg)>=4?C.warn:C.danger}}>{avg}</span>;
    }},
    {label:"운동",render:r=>r?.exercise?.length?r.exercise.map((ex,i)=><div key={i} style={{fontSize:9,color:C.ok,lineHeight:1.5}}>{ex.note}</div>):null},
    {label:"식사",render:r=>r?.meals?.length?r.meals.map((m,i)=>(
      <div key={i} style={{marginBottom:4,textAlign:"left"}}>

          <span style={{fontSize:9,color:C.warn}}>공{m.hungerBefore}</span>

        </div>
      </div>

  ];

  return(
    <Card style={{padding:0,overflow:"hidden"}}>
      <div className="scrollx">
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:Math.max(500,dates.length*90)}}>
          <thead>
            <tr style={{background:C.alt}}>
              <th style={{padding:"10px 14px",fontSize:11,color:C.mid,fontWeight:700,textAlign:"left",borderBottom:"1px solid "+C.border,minWidth:60,position:"sticky",left:0,background:C.alt,zIndex:2}}>항목</th>
              {dates.map(d=>{
                const isToday=d===TODAY;
                const dow=new Date(d).getDay();
                const hasRecord=!!records[d];
                return(
                  <th key={d} style={{padding:"8px 4px",textAlign:"center",borderBottom:"1px solid "+C.border,
                    background:isToday?C.accentL:C.alt,minWidth:80,

                    <div style={{fontSize:11,fontWeight:700,color:dow===0?C.danger:dow===6?C.male:isToday?C.accent:C.mid}}>
                      {DAY_KR[dow]}
                    </div>
                    <div style={{fontSize:10,color:C.mid,fontWeight:isToday?700:400}}>{d.slice(5)}</div>
                    <div style={{width:5,height:5,borderRadius:"50%",background:hasRecord?C.ok:C.border,margin:"3px auto 0"}}/>
                  </th>

              })}
            </tr>
          </thead>
          <tbody>
            {rows.map(({label,render})=>(
              <tr key={label}>
                <td style={{padding:"8px 14px",fontSize:11,color:label==="생리"?C.female:C.mid,fontWeight:600,
                  borderBottom:"1px solid "+C.border,background:C.alt,

                {dates.map((d,i)=>(
                  <td key={d} style={{padding:"6px 4px",textAlign:"center",

                    background:d===TODAY?"#FFFDF9":"transparent",verticalAlign:"top"}}>
                    {render(records[d],i,dates)||<span style={{fontSize:10,color:C.border}}>-</span>}

                    <div>

                      </div>
                    </div>
                  ):(
                    <div onClick={()=>records[d]&&(setEditComment(d),setCommentDraft(records[d]?.coachComment||""))}
                      style={{cursor:records[d]?"pointer":"default",minHeight:20}}>
                      {records[d]?.coachComment
                        ?<div style={{fontSize:9,color:C.accentD,lineHeight:1.5}}>{records[d].coachComment}</div>
                        :records[d]?<div style={{fontSize:9,color:C.border}}>+ 추가</div>:null}
                    </div>
                  )}
                </td>
              ))}
            </tr>
          </tbody>
        </table>
      </div>
    </Card>
  );
}

// ── 체중 그래프 ───────────────────────────────────────────────────────────────
function WeightChart({member,records,dates}){
  const weightDates=dates.filter(d=>records[d]?.weight);
  if(weightDates.length<2)return null;
  const wts=weightDates.map(d=>records[d].weight);
  const minW=Math.min(...wts)-1,maxW=Math.max(...wts)+1;
  const W=560,H=120,pL=36,pR=10,pT=10,pB=22;
  const xp=i=>pL+i*(W-pL-pR)/(weightDates.length-1);
  const yp=v=>pT+(H-pT-pB)*(1-(v-minW)/(maxW-minW));
  const path=wts.map((w,i)=>(i===0?"M":"L")+xp(i)+","+yp(w)).join(" ");
  return(
    <Card>
      <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>체중 추이</div>
      <div className="scrollx">
        <svg width={W} height={H} style={{display:"block"}}>
          {[0,.25,.5,.75,1].map((t,i)=>{
            const y=pT+(H-pT-pB)*t,v=(maxW-(maxW-minW)*t).toFixed(1);
            return<g key={i}><line x1={pL} x2={W-pR} y1={y} y2={y} stroke={C.border} strokeDasharray="3 3"/>
              <text x={pL-4} y={y+4} fontSize={9} fill={C.light} textAnchor="end">{v}</text></g>;
          })}
          {member.targetWeight&&<line x1={pL} x2={W-pR} y1={yp(member.targetWeight)} y2={yp(member.targetWeight)} stroke={C.ok} strokeDasharray="4 4" strokeWidth={1.5}/>}
          <path d={path} fill="none" stroke={C.accent} strokeWidth={2.5} strokeLinejoin="round"/>
          {wts.map((w,i)=>(
            <g key={i}>
              <circle cx={xp(i)} cy={yp(w)} r={4} fill={C.accent}/>
              <text x={xp(i)} y={H-5} fontSize={9} fill={C.light} textAnchor="middle">{weightDates[i].slice(5)}</text>
              <text x={xp(i)} y={yp(w)-7} fontSize={9} fill={C.accent} textAnchor="middle">{w}</text>
            </g>
          ))}
        </svg>
      </div>
    </Card>
  );
}

// ── 코치 회원 상세 뷰 ────────────────────────────────────────────────────────
function MemberDetailView({member,records,onUpdate,apiKey,coachPrompt}){
  const [viewMode,setViewMode]=useState("weekly"); // weekly | monthly
  const now=new Date();
  const [monthYear,setMonthYear]=useState({year:now.getFullYear(),month:now.getMonth()+1});
  const [report,setReport]=useState(null);
  const [genning,setGenning]=useState(false);
  const [photoModal,setPhotoModal]=useState(null);

  const weekDates=getLast7Days();
  const monthDates=getDatesOfMonth(monthYear.year,monthYear.month);

  const displayDates=viewMode==="weekly"?weekDates:monthDates;

  const prevMonth=()=>{
    setMonthYear(p=>{
      const m=p.month-1;
      return m<1?{year:p.year-1,month:12}:{year:p.year,month:m};
    });
  };
  const nextMonth=()=>{
    setMonthYear(p=>{
      const m=p.month+1;
      return m>12?{year:p.year+1,month:1}:{year:p.year,month:m};
    });
  };

  const genReport=async()=>{
    if(!apiKey)return alert("API 키를 먼저 입력해주세요.");
    setGenning(true);
    const weekData=weekDates.map(d=>{
      const r=records[d];if(!r)return null;
      return{date:d,weight:r.weight,sleep:r.sleep?.total,period:r.period,
        meals:r.meals?.map(m=>({food:m.food,hunger:m.hungerBefore,satiety:m.satietyAfter})),
        exercise:r.exercise?.map(e=>e.note)};
    }).filter(Boolean);
    const prompt=coachPrompt+"\n\n회원: "+member.name+", 성별:"+(member.gender==="female"?"여성":"남성")+", 목표:"+member.goal+", 특이사항:"+member.memo+"\n\n최근 7일:\n"+JSON.stringify(weekData)+"\n\nJSON으로만 답하세요:\n{\"appetite_pattern\":\"\",\"satiety_trend\":\"\",\"period_relation\":"+(member.gender==="female"?"\"\"":"null")+",\"sleep_relation\":\"\",\"exercise_consistency\":\"\",\"coach_suggestion\":\"\",\"highlight\":\"\"}";
    const r=await callGemini(apiKey,prompt);
    setReport(r);setGenning(false);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {/* 뷰 전환 탭 */}
      <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <div style={{display:"flex",border:"1.5px solid "+C.border,borderRadius:8,overflow:"hidden"}}>
          {[["weekly","주간"],["monthly","월간"]].map(([k,l])=>(
            <button key={k} onClick={()=>setViewMode(k)}
              style={{padding:"7px 18px",border:"none",cursor:"pointer",fontSize:13,fontWeight:viewMode===k?700:400,
                background:viewMode===k?C.accent:"transparent",color:viewMode===k?"#fff":C.mid}}>
              {l}
            </button>
          ))}
        </div>
        {viewMode==="monthly"&&(
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <Btn size="sm" variant="ghost" onClick={prevMonth}>◀</Btn>
            <span style={{fontWeight:700,fontSize:14}}>{monthYear.year}년 {monthYear.month}월</span>
            <Btn size="sm" variant="ghost" onClick={nextMonth}>▶</Btn>
          </div>
        )}
        {viewMode==="weekly"&&(
          <span style={{fontSize:12,color:C.light}}>최근 7일</span>
        )}
      </div>

      {/* 테이블 */}
      <RecordTable
        member={member}
        records={records}
        dates={displayDates}
        onUpdate={onUpdate}
        showPhotoModal={setPhotoModal}
      />

      {/* 체중 그래프 */}
      <WeightChart member={member} records={records} dates={displayDates}/>

      {/* AI 리포트 (주간만) */}
      {viewMode==="weekly"&&(
        <Card style={{border:"1.5px solid #C0DAC8"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:13,color:C.ok}}>✦ 주간 AI 리포트 (코치 전용)</div>
            <Btn size="sm" variant="outline" onClick={genReport} disabled={genning||!apiKey} style={{borderColor:C.ok,color:C.ok}}>
              {genning?"생성 중...":"리포트 생성"}
            </Btn>
          </div>
          {!apiKey&&<p style={{fontSize:12,color:C.light}}>설정에서 API 키를 먼저 입력해주세요.</p>}
          {report&&(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {report.highlight&&<div style={{background:"#EFF7F1",borderRadius:8,padding:"10px 14px"}}>
                <div style={{fontSize:11,fontWeight:700,color:C.ok,marginBottom:4}}>✨ 이번 주 잘한 점</div>
                <p style={{fontSize:13,color:C.text}}>{report.highlight}</p>
              </div>}
              {[["식욕 안정 패턴","appetite_pattern"],["포만감 추이","satiety_trend"],
                ...(member.gender==="female"?[["생리 주기 연관성","period_relation"]]:[]),
                ["수면 연관성","sleep_relation"],["운동 일관성","exercise_consistency"],["다음 주 코칭 참고","coach_suggestion"]
              ].map(([l,k])=>report[k]?<div key={k}>
                <div style={{fontSize:11,fontWeight:700,color:C.mid,marginBottom:3}}>{l}</div>
                <p style={{fontSize:13,color:C.text,lineHeight:1.6}}>{report[k]}</p>
              </div>:null)}
            </div>
          )}

      )}

      {/* 사진 모달 */}
      {photoModal&&(
        <div onClick={()=>setPhotoModal(null)}
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:1000,
            display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
          <img src={photoModal} alt="" style={{maxWidth:"90vw",maxHeight:"90vh",borderRadius:12}}/>
        </div>
      )}
    </div>
  );
}

function MemberCard({member,records,onSelect,onEdit,onDelete,delId,setDelId}){
  const days7=getLast7Days();
  const todayRec=records[TODAY];
  const latestDate=Object.keys(records).sort().reverse()[0];

  const weights=days7.map(d=>records[d]?.weight).filter(Boolean);

  const satVals=days7.slice(-3).flatMap(d=>records[d]?.meals?.map(m=>m.satietyAfter).filter(Boolean)||[]);
  const avgSat=satVals.length?(satVals.reduce((a,b)=>a+b,0)/satVals.length).toFixed(1):null;
  const dots=days7.map(d=>!!records[d]);

  return(

            </Tag>
            <Tag bg={todayRec?"#EFF7F1":"#FDF0EE"} color={todayRec?C.ok:C.danger}>

          </div>
          <div style={{fontSize:12,color:C.mid}}>{member.goal}</div>
          {member.memo&&<div style={{fontSize:11,color:C.light,marginTop:2}}>{member.memo}</div>}
        </div>
        <div style={{display:"flex",gap:6,flexShrink:0,marginLeft:8}}>
          {delId===member.id
            ?<Confirm onOk={()=>onDelete(member.id)} onCancel={()=>setDelId(null)}/>
            :<>
              <Btn size="sm" variant="ghost" onClick={e=>{e.stopPropagation();onEdit(member);}}>수정</Btn>
              <Btn size="sm" variant="ghost" onClick={e=>{e.stopPropagation();setDelId(member.id);}} style={{color:C.danger}}>삭제</Btn>
            </>}
        </div>
      </div>

          {dots.map((h,i)=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:h?C.ok:C.border}}/>)}
          <span style={{fontSize:10,color:C.light,marginLeft:4}}>({dots.filter(Boolean).length}/7)</span>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:0}}>
          {latestRec?.weight&&<div style={{padding:"4px 12px 4px 0",borderRight:"1px solid "+C.border,marginRight:12,marginBottom:6}}>
            <div style={{fontSize:10,color:C.light}}>최근 체중</div>

            {wDiff&&<div style={{fontSize:10,color:parseFloat(wDiff)>0?C.danger:C.ok}}>{parseFloat(wDiff)>0?"+":""}{wDiff}kg</div>}
          </div>}
          {avgSat&&<div style={{padding:"4px 12px 4px 0",borderRight:"1px solid "+C.border,marginRight:12,marginBottom:6}}>

          const W=200,H=32,p=4;
          const mn=Math.min(...weights)-.5,mx=Math.max(...weights)+.5;
          const pts=weights.map((w,i)=>[(p+(i/(weights.length-1))*(W-p*2)),(p+(1-(w-mn)/(mx-mn))*(H-p*2))]);
          return<svg width={W} height={H} style={{display:"block",marginTop:6}}>
            <polyline points={pts.map(p=>p.join(",")).join(" ")} fill="none" stroke={C.accent} strokeWidth={1.5}/>
            {pts.map(([x,y],i)=><circle key={i} cx={x} cy={y} r={2.5} fill={C.accent}/>)}
          </svg>;
        })()}
        {latestRec?.coachComment&&<div style={{marginTop:8,background:C.accentL,borderRadius:8,padding:"5px 10px"}}>
          <span style={{fontSize:10,color:C.accent,fontWeight:700}}>내 코멘트 </span>
          <span style={{fontSize:11,color:C.accentD}}>{latestRec.coachComment}</span>
        </div>}
        <div style={{marginTop:8,fontSize:11,color:C.light,textAlign:"right"}}>상세 보기 →</div>
      </div>
    </div>
  );
}

// ── 회원 추가/수정 폼 ─────────────────────────────────────────────────────────
function MemberForm({initial,onSave,onCancel,saving}){
  const [d,setD]=useState(initial||{name:"",gender:"female",age:"",goal:"",startWeight:"",targetWeight:"",pin:"",memo:"",personalPrompt:""});
  const f=k=>v=>setD(p=>({...p,[k]:v}));
  return(
    <Card style={{marginBottom:16,border:"1.5px solid "+C.accent}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>{initial?"회원 정보 수정":"새 회원 추가"}</div>
      <div className="form2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>이름 *</div><KInput value={d.name} onChange={f("name")} placeholder="이름"/></div>
        <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>PIN *</div><KInput value={d.pin} onChange={f("pin")} placeholder="PIN 번호"/></div>
        <div>
          <div style={{fontSize:12,color:C.mid,marginBottom:4}}>성별</div>
          <select value={d.gender} onChange={e=>setD(p=>({...p,gender:e.target.value}))} style={{...inputStyle}}>
            <option value="female">여성</option><option value="male">남성</option>
          </select>
        </div>
        <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>나이</div><KInput value={d.age} onChange={f("age")} placeholder="34" type="number"/></div>
        <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>현재 체중 (kg)</div><KInput value={d.startWeight} onChange={f("startWeight")} placeholder="65" type="number"/></div>
        <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>목표 체중 (kg)</div><KInput value={d.targetWeight} onChange={f("targetWeight")} placeholder="58" type="number"/></div>
      </div>
      <div style={{marginBottom:10}}><div style={{fontSize:12,color:C.mid,marginBottom:4}}>목표</div><KInput value={d.goal} onChange={f("goal")} placeholder="식욕 안정 & 체지방 감량"/></div>
      <div style={{marginBottom:10}}><div style={{fontSize:12,color:C.mid,marginBottom:4}}>특이사항</div><KInput value={d.memo} onChange={f("memo")} placeholder="무릎 주의, 갑상선약 복용"/></div>
      <div style={{marginBottom:14}}>
        <div style={{fontSize:12,color:C.mid,marginBottom:4}}>개별 AI 참고사항</div>
        <textarea value={d.personalPrompt} onChange={e=>setD(p=>({...p,personalPrompt:e.target.value}))}
          placeholder="예: 폭식 이력 있음. 격려 위주 피드백 필요."
          style={{...inputStyle,minHeight:72,resize:"vertical"}}/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <Btn size="sm" onClick={()=>onSave(d)} disabled={saving}>{saving?"저장 중...":initial?"수정 저장":"추가"}</Btn>
        <Btn size="sm" variant="ghost" onClick={onCancel}>취소</Btn>
      </div>
    </Card>
  );
}

// ── 코치 대시보드 ─────────────────────────────────────────────────────────────
function CoachDashboard({members,setMembers,allRecords,setAllRecords,apiKey,setApiKey,coachPrompt,setCoachPrompt}){
  const [selected,setSelected]=useState(null);
  const [loading,setLoading]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [showMemberForm,setShowMemberForm]=useState(false);
  const [editingMember,setEditingMember]=useState(null);
  const [delId,setDelId]=useState(null);
  const [saving,setSaving]=useState(false);
  const [promptDraft,setPromptDraft]=useState(coachPrompt);
  const [apiDraft,setApiDraft]=useState("");

  const member=members.find(m=>m.id===selected);
  const memberRecords=selected?(allRecords[selected]||{}):{};

  // 회원 클릭 시 항상 최신 데이터 로드
  const selectMember=async id=>{
    setSelected(id);
    setLoading(true);
    const recs=await apiLoadRecords(id);
    setAllRecords(p=>({...p,[id]:recs}));
    setLoading(false);
  };

  const updateRecord=async(date,rec)=>{
    await apiSaveRecord(selected,date,rec);
    setAllRecords(p=>({...p,[selected]:{...p[selected],[date]:rec}}));
  };

  const saveMember=async draft=>{
    if(!draft.name||!draft.pin)return alert("이름과 PIN은 필수입니다.");
    setSaving(true);
    let updated;
    if(editingMember){
      updated=members.map(m=>m.id===editingMember.id?{...m,...draft,age:Number(draft.age),startWeight:Number(draft.startWeight),targetWeight:Number(draft.targetWeight)}:m);
    }else{
      updated=[...members,{...draft,id:"m"+Date.now(),age:Number(draft.age),startWeight:Number(draft.startWeight),targetWeight:Number(draft.targetWeight)}];
    }
    await apiSaveMembers(updated);
    setMembers(updated);setShowMemberForm(false);setEditingMember(null);setSaving(false);
  };

  const deleteMember=async id=>{
    setSaving(true);
    const updated=members.filter(m=>m.id!==id);
    await apiSaveMembers(updated);
    setMembers(updated);setDelId(null);setSaving(false);
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div style={{fontWeight:700,fontSize:18,display:"flex",alignItems:"center",gap:10}}>
          {selected&&member
            ?<><button onClick={()=>setSelected(null)}
                style={{background:"none",border:"none",cursor:"pointer",fontSize:22,color:C.mid,padding:0}}>←</button>
              <span>{member.name}</span>
              <Tag bg={member.gender==="female"?"#F9E8ED":"#E8EDF5"} color={member.gender==="female"?C.female:C.male}>
                {member.gender==="female"?"여성":"남성"}
              </Tag></>
            :"전체 회원 ("+members.length+"명)"}
        </div>
        <button onClick={()=>setShowSettings(!showSettings)}
          style={{background:C.accentL,border:"none",borderRadius:20,padding:"5px 14px",
            fontSize:12,color:C.accent,cursor:"pointer",fontWeight:600}}>
          ⚙ 설정
        </button>
      </div>

      {showSettings&&(
        <Card style={{marginBottom:16,border:"1.5px solid "+C.accentL}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>코치 설정</div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,color:C.mid,marginBottom:6,fontWeight:600}}>Gemini API 키</div>
            <div style={{display:"flex",gap:8}}>
              <KInput value={apiDraft} onChange={setApiDraft} placeholder={apiKey?"저장됨":"API 키 입력"} type="password"/>
              <Btn size="sm" onClick={()=>{setApiKey(apiDraft);alert("저장됐어요!");}}>저장</Btn>
            </div>
            {apiKey&&<div style={{fontSize:11,color:C.ok,marginTop:4}}>✓ API 키 설정됨</div>}
          </div>
          <div>
            <div style={{fontSize:12,color:C.mid,marginBottom:4,fontWeight:600}}>공통 AI 코칭 방향</div>
            <textarea value={promptDraft} onChange={e=>setPromptDraft(e.target.value)}
              style={{...inputStyle,minHeight:160,resize:"vertical"}}/>
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <Btn size="sm" onClick={()=>{setCoachPrompt(promptDraft);alert("저장됐어요!");}}>저장</Btn>
              <Btn size="sm" variant="ghost" onClick={()=>setShowSettings(false)}>닫기</Btn>
            </div>
          </div>
        </Card>
      )}

      {showMemberForm&&(
        <MemberForm
          initial={editingMember?{...editingMember,age:String(editingMember.age),startWeight:String(editingMember.startWeight),targetWeight:String(editingMember.targetWeight)}:undefined}
          onSave={saveMember} onCancel={()=>{setShowMemberForm(false);setEditingMember(null);}} saving={saving}/>
      )}

      {!selected&&(
        <div>
          {members.length===0&&!showMemberForm&&<div style={{textAlign:"center",padding:40,color:C.light}}>아직 등록된 회원이 없어요</div>}
          <div className="coach-grid">
            {members.map(m=>(
              <MemberCard key={m.id} member={m} records={allRecords[m.id]||{}}
                onSelect={selectMember}
                onEdit={m=>{setEditingMember(m);setShowMemberForm(true);}}
                onDelete={deleteMember} delId={delId} setDelId={setDelId}/>
            ))}
          </div>
          {!showMemberForm&&<div style={{marginTop:12}}>
            <Btn variant="outline" full onClick={()=>{setShowMemberForm(true);setEditingMember(null);}}>+ 회원 추가</Btn>
          </div>}
        </div>
      )}

      {selected&&member&&(
        <div>
          <div style={{fontSize:12,color:C.light,marginBottom:16}}>
            {member.goal}{member.memo&&" · "+member.memo}
          </div>
          {loading?<Spinner/>:(
            <MemberDetailView
              member={member}
              records={memberRecords}
              onUpdate={updateRecord}
              apiKey={apiKey}
              coachPrompt={coachPrompt+(member.personalPrompt?"\n\n이 회원 개별 참고사항:\n"+member.personalPrompt:"")}
            />
          )}
        </div>
      )}
    </div>
  );
}

// ── 로그인 ────────────────────────────────────────────────────────────────────
function Login({onLogin,loading}){
  const [name,setName]=useState("");const [pin,setPin]=useState("");const [err,setErr]=useState("");
  const [taps,setTaps]=useState(0);const [coach,setCoach]=useState(false);
  const [cpw,setCpw]=useState("");const [cerr,setCerr]=useState("");
  const tap=()=>{const n=taps+1;setTaps(n);if(n>=5){setCoach(true);setTaps(0);}};
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{textAlign:"center",marginBottom:40}}>
        <div onClick={tap} style={{fontFamily:"Georgia,serif",fontSize:34,fontStyle:"italic",color:C.accent,letterSpacing:2,cursor:"default",userSelect:"none"}}>DietDesign</div>
        <div style={{fontSize:13,color:C.light,marginTop:6}}>코칭 기록 시스템</div>
      </div>
      {loading?<div style={{color:C.light}}>불러오는 중...</div>:!coach?(
        <div style={{background:C.card,borderRadius:14,border:"1px solid "+C.border,padding:24,width:"100%",maxWidth:340}}>
          <div style={{fontWeight:700,fontSize:16,marginBottom:16}}>로그인</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>이름</div><KInput value={name} onChange={setName} placeholder="이름을 입력하세요"/></div>
            <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>PIN</div><KInput value={pin} onChange={setPin} placeholder="PIN 번호" type="password"/></div>
            {err&&<p style={{color:C.danger,fontSize:12}}>{err}</p>}
            <Btn full onClick={()=>onLogin("member",name,pin,setErr)} style={{marginTop:4,padding:14}}>로그인</Btn>
          </div>
        </div>
      ):(
        <div style={{background:C.card,borderRadius:14,border:"1px solid "+C.border,padding:24,width:"100%",maxWidth:340}}>
          <button onClick={()=>setCoach(false)} style={{background:"none",border:"none",cursor:"pointer",color:C.mid,fontSize:13,marginBottom:16,padding:0}}>← 뒤로</button>
          <div style={{fontWeight:700,fontSize:16,marginBottom:16}}>코치 접속</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>비밀번호</div><KInput value={cpw} onChange={setCpw} placeholder="코치 비밀번호" type="password"/></div>
            {cerr&&<p style={{color:C.danger,fontSize:12}}>{cerr}</p>}
            <Btn full onClick={()=>cpw===COACH_PW?onLogin("coach"):setCerr("비밀번호가 올바르지 않습니다.")} style={{marginTop:4,padding:14}}>접속</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [members,setMembers]=useState([]);
  const [session,setSession]=useState(null);
  const [memberRecords,setMemberRecords]=useState({});
  const [allRecords,setAllRecords]=useState({});
  const [loading,setLoading]=useState(true);
  const [apiKey,setApiKey]=useState("");
  const [coachPrompt,setCoachPrompt]=useState(DEFAULT_PROMPT);

  useEffect(()=>{apiLoadMembers().then(m=>{setMembers(m);setLoading(false);});},[]);

  const handleLogin=async(role,name,pin,setErr)=>{
    if(role==="coach"){
      setSession({role:"coach"});
      const ms=await apiLoadMembers();
      setMembers(ms);
      const recs=await apiLoadAllRecords(ms.map(m=>m.id));
      setAllRecords(recs);
      return;
    }
    const m=members.find(m=>m.name===name&&m.pin===pin);
    if(!m){setErr&&setErr("이름 또는 PIN이 올바르지 않습니다.");return;}
    const recs=await apiLoadRecords(m.id);
    setMemberRecords(recs);
    setSession({role:"member",member:m});
  };

  const saveMyRecord=async(date,rec)=>{
    await apiSaveRecord(session.member.id,date,rec);
    setMemberRecords(p=>({...p,[date]:rec}));
  };

  if(!session)return<Login onLogin={handleLogin} loading={loading}/>;
  const curMember=session.role==="member"?members.find(m=>m.id===session.member.id):null;
  const isCoach=session.role==="coach";

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <div style={{background:C.card,borderBottom:"1px solid "+C.border,position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:isCoach?1200:720,margin:"0 auto",padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontFamily:"Georgia,serif",fontSize:20,fontStyle:"italic",color:C.accent,letterSpacing:1}}>DietDesign</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {!isCoach&&<span style={{fontSize:13,color:C.mid}}>{curMember?.name}님</span>}
            {isCoach&&<Tag>코치</Tag>}
            <Btn size="sm" variant="ghost" onClick={()=>setSession(null)}>로그아웃</Btn>
          </div>
        </div>
      </div>
      <div style={{maxWidth:isCoach?1200:720,margin:"0 auto",padding:"24px 20px 60px"}}>
        {!isCoach&&curMember&&<MemberHome member={curMember} records={memberRecords} onSave={saveMyRecord}/>}
        {isCoach&&<CoachDashboard members={members} setMembers={setMembers} allRecords={allRecords} setAllRecords={setAllRecords} apiKey={apiKey} setApiKey={setApiKey} coachPrompt={coachPrompt} setCoachPrompt={setCoachPrompt}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
