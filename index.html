function getToday(){
  const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
const TODAY=getToday();

function normalizeDate(raw){
  const s=String(raw||"");
  return s.length>10?s.slice(0,10):s;
}

function getLast7Days(){
  return Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(6-i));
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  });
}

function getDatesOfMonth(year,month){
  const days=[];
  const d=new Date(year,month-1,1);
  while(d.getMonth()===month-1){
    days.push(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"));
    d.setDate(d.getDate()+1);
  }
  return days;
}

function getDayOfWeek(dateStr){
  const [y,m,d]=dateStr.split("-").map(Number);
  return new Date(y,m-1,d).getDay();
}

// ── API ───────────────────────────────────────────────────────────────────────
async function sheetGet(sheet){
  try{
    const r=await fetch(SCRIPT_URL+"?sheet="+encodeURIComponent(sheet));
    const d=await r.json();
    return d.data||[];
  }catch{return [];}
}

async function sheetWrite(sheet,row,values){
  try{
    await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({action:"write",sheet,row,values})});
    return true;
  }catch{return false;}
}

async function sheetDelete(sheet,row){
  try{
    await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({action:"delete",sheet,row})});
    return true;
  }catch{return false;}
}

async function apiLoadMembers(){
  const rows=await sheetGet("members");
  return rows.filter(r=>r[0]).map(r=>({
    id:String(r[0]),name:String(r[1]),gender:String(r[2]),
    age:Number(r[3]),goal:String(r[4]||""),
    startWeight:Number(r[5]),targetWeight:Number(r[6]),
    pin:String(r[7]),memo:String(r[8]||""),
    hasPeriod:r[9]==="true"||r[9]===true,
  }));
}

async function apiSaveMembers(members){
  for(let i=0;i<members.length;i++){
    const m=members[i];
    await sheetWrite("members",i+1,[m.id,m.name,m.gender,m.age,m.goal,m.startWeight,m.targetWeight,m.pin,m.memo,m.hasPeriod?"true":"false"]);
  }
}


async function apiLoadPeriods(memberId){
  const rows=await sheetGet("periods");
  return rows.filter(r=>String(r[0])===memberId).map(r=>normalizeDate(r[1])).filter(Boolean).sort();
}

async function apiSavePeriod(memberId,startDate){
  const rows=await sheetGet("periods");
  const exists=rows.some(r=>String(r[0])===memberId&&normalizeDate(r[1])===startDate);
  if(exists)return;
  const nextRow=rows.length+1;
  await sheetWrite("periods",nextRow,[memberId,startDate]);
}

async function apiDeletePeriod(memberId,startDate){
  const rows=await sheetGet("periods");
  const idx=rows.findIndex(r=>String(r[0])===memberId&&normalizeDate(r[1])===startDate);
  if(idx<0)return;
  await sheetDelete("periods",idx+1);
}

async function apiLoadRecords(memberId){
  const rows=await sheetGet("records");
  const result={};
  rows.filter(r=>String(r[0])===memberId).forEach(r=>{
    try{
      const date=normalizeDate(r[1]);
      if(date) result[date]=JSON.parse(String(r[2]));
    }catch{}
  });
  return result;
}

async function apiLoadAllRecords(memberIds){
  const rows=await sheetGet("records");
  const result={};
  memberIds.forEach(id=>{result[id]={};});
  rows.filter(r=>r[0]&&result[String(r[0])]!==undefined).forEach(r=>{
    try{
      const date=normalizeDate(r[1]);
      if(date) result[String(r[0])][date]=JSON.parse(String(r[2]));
    }catch{}
  });
  return result;
}

async function apiSaveRecord(memberId,date,record){
  const rows=await sheetGet("records");
  const matchRows=[];
  rows.forEach((r,i)=>{
    if(String(r[0])===memberId&&normalizeDate(r[1])===date) matchRows.push(i+1);
  });
  if(matchRows.length===0){
    await sheetWrite("records",rows.length+1,[memberId,date,JSON.stringify(record)]);
  }else{
    await sheetWrite("records",matchRows[0],[memberId,date,JSON.stringify(record)]);
    for(let i=matchRows.length-1;i>=1;i--){
      await sheetWrite("records",matchRows[i],["",""," "]);
    }
  }
}

async function callGemini(apiKey,prompt,model){
  try{
    const body={
      contents:[{parts:[{text:prompt}]}],
      generationConfig:{temperature:0.7,maxOutputTokens:2048}
    };
    const url="https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent?key="+apiKey;
    const res=await fetch(url,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(body)
    });
    if(!res.ok){
      const errText=await res.text();
      console.error("Gemini API error",res.status,errText);
      return {raw:"API 오류 "+res.status+": "+errText.slice(0,200)};
    }
    const data=await res.json();
    const text=(data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts&&data.candidates[0].content.parts[0]&&data.candidates[0].content.parts[0].text)||"{}";
    try{
      const jsonMatch=text.match(/\{[\s\S]*\}/);
      if(jsonMatch){return JSON.parse(jsonMatch[0]);}
      else if(text.includes('{')){return {raw:"데이터가 너무 길어 분석이 잘렸습니다. 조금 더 짧게 기록하거나 관리자에게 문의하세요.\n\n"+text};}
      return {raw:text};
    }catch{return {raw:text};}
  }catch(e){
    console.error("callGemini error",e);
    return {raw:"네트워크 오류: "+e.message};
  }
}

function KInput({value,onChange,placeholder,type,style}){
  const composing=useRef(false);
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current&&!composing.current){
      if(ref.current.value!==String(value||"")) ref.current.value=String(value||"");
    }
  },[value]);
  return(
    <input ref={ref} type={type||"text"} defaultValue={value||""} placeholder={placeholder||""}
      onCompositionStart={()=>{composing.current=true;}}
      onCompositionEnd={e=>{composing.current=false;onChange(e.target.value);}}
      onChange={e=>{if(!composing.current)onChange(e.target.value);}}
      style={Object.assign({},inputStyle,style||{})}/>
  );
}

function Sel({value,onChange,options,placeholder}){

}

function calcSleepTotal(start,end){
  if(!start||!end)return "";
  const [sh,sm]=start.split(":").map(Number);
  const [eh,em]=end.split(":").map(Number);
  let mins=(eh*60+em)-(sh*60+sm);
  if(mins<0)mins+=1440;
  return Math.floor(mins/60)+"시간"+(mins%60>0?" "+mins%60+"분":"");
}

function SleepBar({start,end,total}){
  const toFrac=t=>{
    if(!t)return -1;
    const [h,m]=t.split(":").map(Number);
    let mins=h*60+m-21*60;
    if(mins<0)mins+=1440;
    return Math.min(mins/(12*60),1);
  };
  const sf=toFrac(start),ef=toFrac(end);
  return(
    <div>
      <div style={{position:"relative",height:10,background:C.alt,borderRadius:5,overflow:"hidden",border:"1px solid "+C.border}}>
        {sf>=0&&ef>sf&&<div style={{position:"absolute",left:(sf*100)+"%",width:((ef-sf)*100)+"%",height:"100%",background:C.accent,opacity:0.75}}/>}
      </div>

function calcAvgCycle(sortedDates){
  if(sortedDates.length<2)return null;
  var diffs=[];
  for(var i=1;i<sortedDates.length;i++){
    var a=new Date(sortedDates[i-1]),b=new Date(sortedDates[i]);
    diffs.push(Math.round((b-a)/(1000*60*60*24)));
  }
  return Math.round(diffs.reduce(function(s,d){return s+d;},0)/diffs.length);
}

function getPeriodPhase(sortedDates,targetDate){
  // 가장 최근 시작일 기준으로 위상 계산
  if(!sortedDates||sortedDates.length===0)return null;
  var avgCycle=sortedDates.length>=2?calcAvgCycle(sortedDates):28;
  var target=new Date(targetDate);

  // 가장 가까운 시작일 찾기 (과거 or 미래)
  var candidates=[];
  var last=new Date(sortedDates[sortedDates.length-1]);
  // 과거 시작일들
  for(var i=sortedDates.length-1;i>=0;i--){
    candidates.push(new Date(sortedDates[i]));
  }
  // 예상 미래 시작일들 (3개월치)
  for(var j=1;j<=3;j++){
    var future=new Date(last);
    future.setDate(future.getDate()+avgCycle*j);
    candidates.push(future);
  }

  // target 이전 가장 최근 시작일 찾기
  var refStart=null;
  for(var k=0;k<candidates.length;k++){
    if(candidates[k]<=target){
      if(!refStart||candidates[k]>refStart)refStart=candidates[k];
    }
  }
  if(!refStart)return null;

  var dayNum=Math.round((target-refStart)/(1000*60*60*24))+1; // D+1 기준
  if(dayNum<=5)return "period"; // 생리기
  if(dayNum<=Math.round(avgCycle/2)-1)return "follicular"; // 난포기
  if(dayNum<=Math.round(avgCycle/2)+1)return "ovulation"; // 배란기
  if(dayNum<=avgCycle)return "luteal"; // 황체기
  return null;
}

  const [sleepEnd,setSleepEnd]=useState((record&&record.sleep&&record.sleep.end)||"");
  const [toilet,setToilet]=useState(String((record&&record.toilet)||""));
  const [meals,setMeals]=useState(function(){return record&&record.meals?JSON.parse(JSON.stringify(record.meals)):[];});
  const [exercise,setExercise]=useState(function(){return record&&record.exercise?JSON.parse(JSON.stringify(record.exercise)):[];});
  const [addingMeal,setAddingMeal]=useState(false);
  const [editMealIdx,setEditMealIdx]=useState(null);
  const [delMealIdx,setDelMealIdx]=useState(null);
  const [addingEx,setAddingEx]=useState(false);
  const [editExIdx,setEditExIdx]=useState(null);
  const [delExIdx,setDelExIdx]=useState(null);
  const [memberComment,setMemberComment]=useState((record&&record.memberComment)||"");
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);

  const total=calcSleepTotal(sleepStart,sleepEnd);

  const handleSave=async function(){
    setSaving(true);
    await onSave(date,{
      weight:weight?parseFloat(weight):null,
      waist:waist?parseFloat(waist):null,
      sleep:{start:sleepStart,end:sleepEnd,total:total},
      toilet:toilet?parseInt(toilet):null,
      meals:meals,
      exercise:exercise,
      coachComment:(record&&record.coachComment)||"",
      memberComment:memberComment||null,

    setSaving(false);setSaved(true);
    setTimeout(function(){setSaved(false);},2500);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",alignItems:"center",gap:12,background:C.accentL,borderRadius:10,padding:"10px 16px"}}>

        <div style={{position:"relative",flex:1,maxWidth:220}}>
          <input type="date" value={date} max={TODAY} onChange={e=>onDateChange(e.target.value)}
            style={Object.assign({},inputStyle,{background:"transparent",border:"1.5px solid "+C.accent,color:"transparent",caretColor:"transparent"})}/>
          <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",
            fontSize:13,color:C.accentD,fontWeight:600,pointerEvents:"none"}}>
            {date} ({DAY_KR[getDayOfWeek(date)]})
          </span>
        </div>
        {date===TODAY&&<Tag>오늘</Tag>}
      </div>

      {record&&record.coachComment&&(
        <div style={{background:C.accentL,borderRadius:12,padding:"12px 16px",border:"1.5px solid "+C.accent+"40"}}>
          <div style={{fontSize:11,fontWeight:700,color:C.accent,marginBottom:6}}>코치 코멘트</div>
          <p style={{fontSize:13,color:C.text,lineHeight:1.7}}>{record.coachComment}</p>

      <Card>
        <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>신체 지표</div>
        <div className="form2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>체중 (kg)</div><KInput value={weight} onChange={setWeight} placeholder="예: 65.5" type="number"/></div>
          <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>허리 둘레 (cm)</div><KInput value={waist} onChange={setWaist} placeholder="예: 80" type="number"/></div>
          <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>취침 시간</div><Sel value={sleepStart} onChange={setSleepStart} options={TIME_OPTS} placeholder="취침 시간 선택"/></div>
          <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>기상 시간</div><Sel value={sleepEnd} onChange={setSleepEnd} options={TIME_OPTS} placeholder="기상 시간 선택"/></div>
          <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>화장실 (횟수)</div><KInput value={toilet} onChange={setToilet} placeholder="예: 1" type="number"/></div>

            <div key={i}>

                  onCancel={function(){setEditExIdx(null);}}/>

  );

// ── 기록 테이블 (회원/코치 공용) ──────────────────────────────────────────────
function RecordTable({member,records,dates,onUpdate,isReadOnly,periods}){
  const [editComment,setEditComment]=useState(null);
  const [commentDraft,setCommentDraft]=useState("");
  const [savingC,setSavingC]=useState(false);
  const ro=isReadOnly||false;

  const saveComment=async function(date){
    setSavingC(true);
    const rec=records[date]||{};
    await onUpdate(date,Object.assign({},rec,{coachComment:commentDraft}));
    setEditComment(null);setSavingC(false);
  };

  const rows=[
    {label:"수면",render:function(r){return r&&r.sleep&&r.sleep.total?<span style={{fontSize:11,fontWeight:700}}>{r.sleep.total}</span>:null;}},
    {label:"체중",render:function(r,i){
      if(!r||!r.weight)return null;
      const prev=i>0&&records[dates[i-1]]?records[dates[i-1]].weight:null;
      const diff=prev?(r.weight-prev).toFixed(1):null;
      return<div style={{textAlign:"center"}}>
        <div style={{fontSize:13,fontWeight:800,color:C.accent}}>{r.weight}</div>
        {diff&&<div style={{fontSize:9,color:parseFloat(diff)>0?C.danger:C.ok}}>{parseFloat(diff)>0?"+":""}{diff}</div>}
      </div>;
    }},
    {label:"허리",render:function(r){return r&&r.waist?<span style={{fontSize:11}}>{r.waist}</span>:null;}},
    {label:"화장실",render:function(r){return r&&r.toilet!=null?<span style={{fontSize:11}}>{r.toilet}</span>:null;}},
    {label:"운동",render:function(r){
      return r&&r.exercise&&r.exercise.length?r.exercise.map(function(ex,i){return<div key={i} style={{fontSize:9,color:C.ok,lineHeight:1.5}}>{ex.time&&<span style={{color:"#B0A599",marginRight:3}}>{ex.time}</span>}{ex.note}</div>;}):null;
    }},
    {label:"식사",render:function(r){
      return r&&r.meals&&r.meals.length?r.meals.map(function(m,i){
        return(
          <div key={i} style={{marginBottom:4,textAlign:"left"}}>
            <div style={{fontSize:9,color:C.light}}>{m.time}</div>
            <div style={{fontSize:9,color:C.text,wordBreak:"break-all"}}>{m.food}</div>
            <span style={{fontSize:9,color:C.warn}}>공{m.hungerBefore}</span>
            {" "}
            <span style={{fontSize:9,color:C.ok}}>포{m.satietyAfter}</span>

          </div>
        );
      }):null;
    }},
  ];

  return(
    <Card style={{padding:0,overflow:"hidden"}}>
      <div className="scrollx">
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:60+dates.length*110}}>
          <thead>
            <tr style={{background:C.alt}}>
              <th style={{padding:"10px 14px",fontSize:11,color:C.mid,fontWeight:700,textAlign:"left",
                borderBottom:"1px solid "+C.border,minWidth:60,position:"sticky",left:0,background:C.alt,zIndex:2}}>항목</th>
              {dates.map(function(d){
                var isToday=d===TODAY;
                var dow=getDayOfWeek(d);
                var hasRecord=!!records[d];
                return(
                  <th key={d} style={{padding:"8px 4px",textAlign:"center",
                    borderBottom:"1px solid "+C.border,
                    background:isToday?C.accentL:(member.hasPeriod&&periods?(function(){var ph=getPeriodPhase(periods,d);return ph?PHASE_COLORS[ph].bg:C.alt;})():C.alt),minWidth:110,
                    borderLeft:"1px solid "+C.border}}>
                    <div style={{fontSize:11,fontWeight:700,color:dow===0?C.danger:dow===6?C.male:isToday?C.accent:C.mid}}>{DAY_KR[dow]}</div>
                    <div style={{fontSize:10,color:C.mid,fontWeight:isToday?700:400}}>{d.slice(5)}</div>
                    <div style={{width:5,height:5,borderRadius:"50%",background:hasRecord?C.ok:C.border,margin:"3px auto 0"}}/>
                    {member.hasPeriod&&periods&&(function(){var ph=getPeriodPhase(periods,d);return ph?<div style={{fontSize:8,color:PHASE_COLORS[ph].color,marginTop:2,fontWeight:700}}>{PHASE_COLORS[ph].label}</div>:null;})()}
                  </th>
                );
              })}
            </tr>
          </thead>
          <tbody>
            {rows.map(function(row){
              return(
                <tr key={row.label}>
                  <td style={{padding:"8px 14px",fontSize:11,
                    color:row.label==="생리"?C.female:C.mid,fontWeight:600,
                    borderBottom:"1px solid "+C.border,background:C.alt,
                    position:"sticky",left:0,zIndex:1}}>{row.label}</td>
                  {dates.map(function(d,i){
                    return(
                      <td key={d} style={{padding:"6px 4px",textAlign:"center",
                        borderBottom:"1px solid "+C.border,borderLeft:"1px solid "+C.border,
                        background:d===TODAY?"#FFFDF9":"transparent",verticalAlign:"top"}}>
                        {row.render(records[d],i)||<span style={{fontSize:10,color:C.border}}>-</span>}
                      </td>
                    );
                  })}
                </tr>
              );
            })}
            <tr>
              <td style={{padding:"8px 14px",fontSize:11,color:C.mid,fontWeight:600,
                background:C.alt,verticalAlign:"top",position:"sticky",left:0,zIndex:1,
                borderBottom:"1px solid "+C.border}}>내 한마디</td>
              {dates.map(function(d){
                return(
                  <td key={d} style={{padding:"5px 4px",verticalAlign:"top",
                    borderLeft:"1px solid "+C.border,borderBottom:"1px solid "+C.border,
                    background:d===TODAY?"#FFFDF9":"transparent"}}>
                    {records[d]&&records[d].memberComment
                      ?<div style={{fontSize:9,color:C.text,lineHeight:1.5,fontStyle:"italic"}}>{records[d].memberComment}</div>
                      :null}
                  </td>
                );
              })}
            </tr>
            <tr>
              <td style={{padding:"8px 14px",fontSize:11,color:C.accent,fontWeight:600,
                background:C.alt,verticalAlign:"top",position:"sticky",left:0,zIndex:1,
                borderBottom:"1px solid "+C.border}}>코멘트</td>
              {dates.map(function(d){
                return(
                  <td key={d} style={{padding:"5px 4px",verticalAlign:"top",
                    borderLeft:"1px solid "+C.border,borderBottom:"1px solid "+C.border,
                    background:d===TODAY?"#FFFDF9":"transparent"}}>
                    {!ro&&editComment===d?(
                      <div>
                        <textarea value={commentDraft} onChange={function(e){setCommentDraft(e.target.value);}}
                          style={{width:"100%",minHeight:56,fontSize:9,border:"1px solid "+C.border,
                            borderRadius:6,padding:4,fontFamily:"inherit",resize:"vertical"}} autoFocus/>
                        <div style={{display:"flex",gap:3,marginTop:3}}>
                          <Btn size="sm" onClick={function(){saveComment(d);}} disabled={savingC} style={{fontSize:10,padding:"3px 7px"}}>{savingC?"저장중":"저장"}</Btn>
                          <Btn size="sm" variant="ghost" onClick={function(){setEditComment(null);}} style={{fontSize:10,padding:"3px 7px"}}>취소</Btn>
                        </div>
                      </div>
                    ):(
                      <div onClick={function(){if(!ro&&records[d]){setEditComment(d);setCommentDraft((records[d]&&records[d].coachComment)||"");}}}
                        style={{cursor:(!ro&&records[d])?"pointer":"default",minHeight:20}}>
                        {records[d]&&records[d].coachComment
                          ?<div style={{fontSize:9,color:C.accentD,lineHeight:1.5,fontStyle:ro?"italic":"normal"}}>{records[d].coachComment}</div>
                          :(!ro&&records[d])?<div style={{fontSize:9,color:C.border}}>+ 추가</div>:null}
                      </div>
                    )}
                  </td>
                );
              })}
            </tr>
          </tbody>
        </table>
      </div>
    </Card>
  );
}

// ── 체중 그래프 ───────────────────────────────────────────────────────────────
function WeightChart({member,records,dates}){
  var weightDates=dates.filter(function(d){return records[d]&&records[d].weight;});
  if(weightDates.length<2)return null;
  var wts=weightDates.map(function(d){return records[d].weight;});
  var minW=Math.min.apply(null,wts)-1,maxW=Math.max.apply(null,wts)+1;
  var W=560,H=120,pL=36,pR=10,pT=10,pB=22;
  var xp=function(i){return pL+i*(W-pL-pR)/(weightDates.length-1);};
  var yp=function(v){return pT+(H-pT-pB)*(1-(v-minW)/(maxW-minW));};
  var path=wts.map(function(w,i){return (i===0?"M":"L")+xp(i)+","+yp(w);}).join(" ");
  return(
    <Card>
      <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>체중 추이</div>
      <div className="scrollx">
        <svg width={W} height={H} style={{display:"block"}}>
          {[0,.25,.5,.75,1].map(function(t,i){
            var y=pT+(H-pT-pB)*t,v=(maxW-(maxW-minW)*t).toFixed(1);
            return<g key={i}><line x1={pL} x2={W-pR} y1={y} y2={y} stroke={C.border} strokeDasharray="3 3"/>
              <text x={pL-4} y={y+4} fontSize={9} fill={C.light} textAnchor="end">{v}</text></g>;
          })}
          {member.targetWeight&&<line x1={pL} x2={W-pR} y1={yp(member.targetWeight)} y2={yp(member.targetWeight)} stroke={C.ok} strokeDasharray="4 4" strokeWidth={1.5}/>}
          <path d={path} fill="none" stroke={C.accent} strokeWidth={2.5} strokeLinejoin="round"/>
          {wts.map(function(w,i){
            return(
              <g key={i}>
                <circle cx={xp(i)} cy={yp(w)} r={4} fill={C.accent}/>
                <text x={xp(i)} y={H-5} fontSize={9} fill={C.light} textAnchor="middle">{weightDates[i].slice(5)}</text>
                <text x={xp(i)} y={yp(w)-7} fontSize={9} fill={C.accent} textAnchor="middle">{w}</text>
              </g>
            );
          })}
        </svg>
      </div>
    </Card>
  );
}

// ── 뷰 컨트롤 공통 (주간/월간 전환) ──────────────────────────────────────────
function ViewControls({viewMode,setViewMode,monthYear,setMonthYear}){
  var prevMonth=function(){setMonthYear(function(p){var m=p.month-1;return m<1?{year:p.year-1,month:12}:{year:p.year,month:m};});};
  var nextMonth=function(){setMonthYear(function(p){var m=p.month+1;return m>12?{year:p.year+1,month:1}:{year:p.year,month:m};});};
  return(
    <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
      <div style={{display:"flex",border:"1.5px solid "+C.border,borderRadius:8,overflow:"hidden"}}>
        {[["weekly","주간"],["monthly","월간"]].map(function(pair){
          var k=pair[0],l=pair[1];
          return(
            <button key={k} onClick={function(){setViewMode(k);}}
              style={{padding:"7px 18px",border:"none",cursor:"pointer",fontSize:13,
                fontWeight:viewMode===k?700:400,
                background:viewMode===k?C.accent:"transparent",
                color:viewMode===k?"#fff":C.mid}}>
              {l}
            </button>
          );
        })}
      </div>
      {viewMode==="monthly"&&(
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <Btn size="sm" variant="ghost" onClick={prevMonth}>◀</Btn>
          <span style={{fontWeight:700,fontSize:14}}>{monthYear.year}년 {monthYear.month}월</span>
          <Btn size="sm" variant="ghost" onClick={nextMonth}>▶</Btn>
        </div>
      )}
      {viewMode==="weekly"&&<span style={{fontSize:12,color:C.light}}>최근 7일</span>}
    </div>
  );
}

// ── 회원 홈 ───────────────────────────────────────────────────────────────────
function MemberHome({member,records,onSave}){
  var now=new Date();
  const [tab,setTab]=useState("write");
  const [selectedDate,setSelectedDate]=useState(TODAY);
  const [viewMode,setViewMode]=useState("weekly");
  const [monthYear,setMonthYear]=useState({year:now.getFullYear(),month:now.getMonth()+1});
  const [periods,setPeriods]=useState([]);
  useEffect(function(){if(member.hasPeriod)apiLoadPeriods(member.id).then(setPeriods);},[member.id]);

  var weekDates=getLast7Days();
  var monthDates=getDatesOfMonth(monthYear.year,monthYear.month);
  var displayDates=viewMode==="weekly"?weekDates:monthDates;

  return(
    <div>
      <div style={{display:"flex",borderBottom:"2px solid "+C.border,marginBottom:20}}>
        {[["write","기록하기"],["view","내 기록 보기"]].map(function(pair){
          var k=pair[0],l=pair[1];
          return(
            <button key={k} onClick={function(){setTab(k);}}
              style={{padding:"10px 20px",border:"none",background:"none",cursor:"pointer",fontSize:14,
                fontWeight:tab===k?700:400,color:tab===k?C.accent:C.mid,
                borderBottom:"2px solid "+(tab===k?C.accent:"transparent"),marginBottom:-2}}>
              {l}
            </button>
          );
        })}
      </div>

      {tab==="write"&&(
        <RecordForm key={selectedDate} member={member} date={selectedDate}
          record={records[selectedDate]}
          onSave={async function(date,rec){await onSave(date,rec);}}
          onDateChange={setSelectedDate}/>
      )}

      {tab==="view"&&(

  var yesterday=(function(){

      var r=records[d];if(!r)return null;

        </div>
        <Btn size="sm" variant="outline" onClick={genReport} disabled={genning||!apiKey}
          style={{borderColor:C.accent,color:C.accent}}>
          {genning?"생성 중...":report?"다시 생성":"브리핑 생성"}

      </div>
      {!apiKey&&<p style={{fontSize:12,color:C.light,marginTop:8}}>설정에서 API 키를 먼저 입력해주세요.</p>}
      {report&&report.raw&&(
        <div style={{background:"#FDF0EE",borderRadius:8,padding:"10px 14px",marginTop:8}}>
          <div style={{fontSize:11,fontWeight:700,color:C.danger,marginBottom:4}}>오류 또는 원문</div>

// ── 회원 카드 ─────────────────────────────────────────────────────────────────
function MemberCard({member,records,onSelect,onEdit,onDelete,delId,setDelId}){
  var days7=getLast7Days();
  var todayRec=records[TODAY];
  var latestDate=Object.keys(records).sort().reverse()[0];
  var latestRec=latestDate?records[latestDate]:null;
  var weights=days7.map(function(d){return records[d]&&records[d].weight;}).filter(Boolean);
  var wDiff=weights.length>=2?(weights[weights.length-1]-weights[0]).toFixed(1):null;
  var satVals=days7.slice(-3).reduce(function(acc,d){
    return acc.concat((records[d]&&records[d].meals)?records[d].meals.map(function(m){return m.satietyAfter;}).filter(Boolean):[]);
  },[]);
  var avgSat=satVals.length?(satVals.reduce(function(a,b){return a+b;},0)/satVals.length).toFixed(1):null;
  var dots=days7.map(function(d){return !!records[d];});

  return(
    <div style={{background:C.card,borderRadius:16,border:"1px solid "+C.border,overflow:"hidden"}}>
      <div style={{padding:"14px 16px 10px",borderBottom:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1,cursor:"pointer"}} onClick={function(){onSelect(member.id);}}>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
            <span style={{fontWeight:700,fontSize:16}}>{member.name}</span>
            <Tag bg={member.gender==="female"?"#F9E8ED":"#E8EDF5"} color={member.gender==="female"?C.female:C.male}>
              {member.gender==="female"?"여":"남"} {member.age}세
            </Tag>
            <Tag bg={todayRec?"#EFF7F1":"#FDF0EE"} color={todayRec?C.ok:C.danger}>
              {todayRec?"오늘 완료":"오늘 미기록"}
            </Tag>
          </div>
          <div style={{fontSize:12,color:C.mid}}>{member.goal}</div>
          {member.memo&&<div style={{fontSize:11,color:C.light,marginTop:2}}>{member.memo}</div>}
        </div>
        <div style={{display:"flex",gap:6,flexShrink:0,marginLeft:8}}>
          {delId===member.id
            ?<Confirm onOk={function(){onDelete(member.id);}} onCancel={function(){setDelId(null);}}/>
            :<span>
              <Btn size="sm" variant="ghost" onClick={function(e){e.stopPropagation();onEdit(member);}}>수정</Btn>
              {" "}
              <Btn size="sm" variant="ghost" onClick={function(e){e.stopPropagation();setDelId(member.id);}} style={{color:C.danger}}>삭제</Btn>
            </span>}
        </div>
      </div>
      <div style={{padding:"10px 16px",cursor:"pointer"}} onClick={function(){onSelect(member.id);}}>
        <div style={{display:"flex",gap:4,alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:10,color:C.light,marginRight:4}}>이번주</span>
          {dots.map(function(h,i){return<div key={i} style={{width:8,height:8,borderRadius:"50%",background:h?C.ok:C.border}}/>;} )}
          <span style={{fontSize:10,color:C.light,marginLeft:4}}>({dots.filter(Boolean).length}/7)</span>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:0}}>
          {latestRec&&latestRec.weight&&<div style={{padding:"4px 12px 4px 0",borderRight:"1px solid "+C.border,marginRight:12,marginBottom:6}}>
            <div style={{fontSize:10,color:C.light}}>최근 체중</div>
            <div style={{fontSize:16,fontWeight:800,color:C.accent}}>{latestRec.weight}<span style={{fontSize:10,fontWeight:400}}>kg</span></div>
            {wDiff&&<div style={{fontSize:10,color:parseFloat(wDiff)>0?C.danger:C.ok}}>{parseFloat(wDiff)>0?"+":""}{wDiff}kg</div>}
          </div>}
          {avgSat&&<div style={{padding:"4px 12px 4px 0",borderRight:"1px solid "+C.border,marginRight:12,marginBottom:6}}>
            <div style={{fontSize:10,color:C.light}}>포만감 평균</div>
            <div style={{fontSize:16,fontWeight:800,color:parseFloat(avgSat)>=7?C.ok:parseFloat(avgSat)>=4?C.warn:C.danger}}>{avgSat}</div>
            <div style={{fontSize:10,color:C.light}}>최근 3일</div>
          </div>}
        </div>
        {weights.length>=3&&(function(){
          var W=200,H=32,p=4;
          var mn=Math.min.apply(null,weights)-.5,mx=Math.max.apply(null,weights)+.5;
          var pts=weights.map(function(w,i){return [(p+(i/(weights.length-1))*(W-p*2)),(p+(1-(w-mn)/(mx-mn))*(H-p*2))];});
          return<svg width={W} height={H} style={{display:"block",marginTop:6}}>
            <polyline points={pts.map(function(pt){return pt.join(",");}).join(" ")} fill="none" stroke={C.accent} strokeWidth={1.5}/>
            {pts.map(function(pt,i){return<circle key={i} cx={pt[0]} cy={pt[1]} r={2.5} fill={C.accent}/>;} )}
          </svg>;
        })()}
        {latestRec&&latestRec.coachComment&&(
          <div style={{marginTop:8,background:C.accentL,borderRadius:8,padding:"5px 10px"}}>
            <span style={{fontSize:10,color:C.accent,fontWeight:700}}>코멘트 </span>
            <span style={{fontSize:11,color:C.accentD}}>{latestRec.coachComment}</span>
          </div>
        )}
        <div style={{marginTop:8,fontSize:11,color:C.light,textAlign:"right"}}>상세 보기 →</div>
      </div>
    </div>
  );
}

        </div>
        <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>나이</div><KInput value={d.age} onChange={f("age")} placeholder="34" type="number"/></div>
        <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>현재 체중 (kg)</div><KInput value={d.startWeight} onChange={f("startWeight")} placeholder="65" type="number"/></div>
        <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>목표 체중 (kg)</div><KInput value={d.targetWeight} onChange={f("targetWeight")} placeholder="58" type="number"/></div>
      </div>
      <div style={{marginBottom:10}}><div style={{fontSize:12,color:C.mid,marginBottom:4}}>목표</div><KInput value={d.goal} onChange={f("goal")} placeholder="식욕 안정 & 체지방 감량"/></div>
      <div style={{marginBottom:10}}><div style={{fontSize:12,color:C.mid,marginBottom:4}}>특이사항</div><KInput value={d.memo} onChange={f("memo")} placeholder="무릎 주의, 갑상선약 복용"/></div>
      {d.gender==="female"&&(
        <div style={{marginBottom:10,display:"flex",alignItems:"center",gap:10}}>
          <input type="checkbox" id="hasPeriod" checked={!!d.hasPeriod}
            onChange={function(e){setD(function(p){return Object.assign({},p,{hasPeriod:e.target.checked});});}}
            style={{width:16,height:16,accentColor:C.female}}/>
          <label htmlFor="hasPeriod" style={{fontSize:13,color:C.female,cursor:"pointer"}}>생리 주기 기록 사용</label>
        </div>
      )}
      <div style={{display:"flex",gap:8}}>
        <Btn size="sm" onClick={function(){onSave(d);}} disabled={saving}>{saving?"저장 중...":initial?"수정 저장":"추가"}</Btn>
        <Btn size="sm" variant="ghost" onClick={onCancel}>취소</Btn>
      </div>
    </Card>
  );
}

// ── 코치 대시보드 ─────────────────────────────────────────────────────────────
function CoachDashboard({members,setMembers,allRecords,setAllRecords,apiKey,setApiKey,geminiModel,setGeminiModel,coachPrompt,setCoachPrompt}){
  const [selected,setSelected]=useState(null);
  const [loading,setLoading]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [showMemberForm,setShowMemberForm]=useState(false);
  const [editingMember,setEditingMember]=useState(null);
  const [delId,setDelId]=useState(null);
  const [saving,setSaving]=useState(false);
  const [promptDraft,setPromptDraft]=useState(coachPrompt);
  const [apiDraft,setApiDraft]=useState("");
  const [modelDraft,setModelDraft]=useState(geminiModel);

  const [periods,setPeriods]=useState([]);

  var member=members.find(function(m){return m.id===selected;});
  var memberRecords=selected?(allRecords[selected]||{}):{};

  var selectMember=async function(id){
    setSelected(id);setLoading(true);
    var member=members.find(function(m){return m.id===id;});
    var recs=await apiLoadRecords(id);
    setAllRecords(function(p){return Object.assign({},p,{[id]:recs});});
    if(member&&member.hasPeriod){
      var p=await apiLoadPeriods(id);
      setPeriods(p);
    }else{
      setPeriods([]);
    }
    setLoading(false);
  };

  var updateRecord=async function(date,rec){
    await apiSaveRecord(selected,date,rec);
    setAllRecords(function(p){
      var mRecs=Object.assign({},p[selected],{[date]:rec});
      return Object.assign({},p,{[selected]:mRecs});
    });
  };

  var saveMember=async function(draft){
    if(!draft.name||!draft.pin){alert("이름과 PIN은 필수입니다.");return;}
    setSaving(true);
    var updated;
    if(editingMember){
      updated=members.map(function(m){
        return m.id===editingMember.id?Object.assign({},m,draft,{age:Number(draft.age),startWeight:Number(draft.startWeight),targetWeight:Number(draft.targetWeight)}):m;
      });
    }else{
      updated=members.concat([Object.assign({},draft,{id:"m"+Date.now(),age:Number(draft.age),startWeight:Number(draft.startWeight),targetWeight:Number(draft.targetWeight)})]);
    }
    await apiSaveMembers(updated);
    setMembers(updated);setShowMemberForm(false);setEditingMember(null);setSaving(false);
  };

  var deleteMember=async function(id){
    setSaving(true);
    var updated=members.filter(function(m){return m.id!==id;});
    await apiSaveMembers(updated);
    setMembers(updated);setDelId(null);setSaving(false);
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div style={{fontWeight:700,fontSize:18,display:"flex",alignItems:"center",gap:10}}>
          {selected&&member
            ?<span>
              <button onClick={function(){setSelected(null);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:22,color:C.mid,padding:0,marginRight:8}}>←</button>
              {member.name}
              {" "}
              <Tag bg={member.gender==="female"?"#F9E8ED":"#E8EDF5"} color={member.gender==="female"?C.female:C.male}>
                {member.gender==="female"?"여성":"남성"}
              </Tag>
            </span>
            :<span>전체 회원 ({members.length}명)</span>}
        </div>
        <button onClick={function(){setShowSettings(!showSettings);}}
          style={{background:C.accentL,border:"none",borderRadius:20,padding:"5px 14px",fontSize:12,color:C.accent,cursor:"pointer",fontWeight:600}}>
          설정
        </button>
      </div>

      {showSettings&&(
        <Card style={{marginBottom:16,border:"1.5px solid "+C.accentL}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>코치 설정</div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,color:C.mid,marginBottom:6,fontWeight:600}}>Gemini API 키</div>
            <div style={{display:"flex",gap:8}}>
              <KInput value={apiDraft} onChange={setApiDraft} placeholder={apiKey?"저장됨 (변경하려면 입력)":"API 키 입력"} type="password"/>
              <Btn size="sm" onClick={function(){
                setApiKey(apiDraft);
                localStorage.setItem("dd_apikey",apiDraft);
                alert("저장됐어요!");
              }}>저장</Btn>
            </div>
            {apiKey&&<div style={{fontSize:11,color:C.ok,marginTop:4}}>API 키 설정됨</div>}
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,color:C.mid,marginBottom:4,fontWeight:600}}>Gemini 모델명</div>
            <div style={{display:"flex",gap:8}}>
              <KInput value={modelDraft} onChange={setModelDraft} placeholder="모델명 입력"/>
              <Btn size="sm" onClick={function(){
                if(!modelDraft.trim())return;
                setGeminiModel(modelDraft.trim());
                localStorage.setItem("dd_model",modelDraft.trim());
                alert("저장됐어요!");
              }}>저장</Btn>
            </div>
            <div style={{fontSize:11,color:C.light,marginTop:4}}>현재: {geminiModel}</div>
            <div style={{fontSize:11,color:C.light,marginTop:2}}>
              {"사용 가능한 모델은 "}
              <a href="https://aistudio.google.com" target="_blank" style={{color:C.accent}}>Google AI Studio</a>
              {"에서 확인"}
            </div>
          </div>
          <div>
            <div style={{fontSize:12,color:C.mid,marginBottom:4,fontWeight:600}}>공통 AI 코칭 방향</div>
            <textarea value={promptDraft} onChange={function(e){setPromptDraft(e.target.value);}}
              style={Object.assign({},inputStyle,{minHeight:160,resize:"vertical"})}/>
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <Btn size="sm" onClick={function(){setCoachPrompt(promptDraft);alert("저장됐어요!");}}>저장</Btn>
              <Btn size="sm" variant="ghost" onClick={function(){setShowSettings(false);}}>닫기</Btn>
            </div>
          </div>
        </Card>
      )}

      {showMemberForm&&(
        <MemberForm
          initial={editingMember?Object.assign({},editingMember,{age:String(editingMember.age),startWeight:String(editingMember.startWeight),targetWeight:String(editingMember.targetWeight)}):undefined}
          onSave={saveMember} onCancel={function(){setShowMemberForm(false);setEditingMember(null);}} saving={saving}/>
      )}

      {!selected&&(
        <div>
          {members.length===0&&!showMemberForm&&<div style={{textAlign:"center",padding:40,color:C.light}}>아직 등록된 회원이 없어요</div>}
          <div className="coach-grid">
            {members.map(function(m){
              return(
                <MemberCard key={m.id} member={m} records={allRecords[m.id]||{}}
                  onSelect={selectMember}
                  onEdit={function(m){setEditingMember(m);setShowMemberForm(true);}}
                  onDelete={deleteMember} delId={delId} setDelId={setDelId}/>
              );
            })}
          </div>
          {!showMemberForm&&<div style={{marginTop:12}}><Btn variant="outline" full onClick={function(){setShowMemberForm(true);setEditingMember(null);}}>+ 회원 추가</Btn></div>}
        </div>
      )}

      {selected&&member&&(
        <div>
          <div style={{fontSize:12,color:C.light,marginBottom:16}}>{member.goal}{member.memo&&" · "+member.memo}</div>
          {loading?<Spinner/>:(
            <MemberDetailView member={member} records={memberRecords} onUpdate={updateRecord}
              apiKey={apiKey} geminiModel={geminiModel}
              coachPrompt={coachPrompt} periods={periods} setPeriods={setPeriods}/>
          )}
        </div>
      )}
    </div>
  );
}

// ── 로그인 ────────────────────────────────────────────────────────────────────
function Login({onLogin,loading}){
  const [name,setName]=useState("");
  const [pin,setPin]=useState("");
  const [err,setErr]=useState("");
  const [taps,setTaps]=useState(0);
  const [coach,setCoach]=useState(false);
  const [cpw,setCpw]=useState("");
  const [cerr,setCerr]=useState("");
  var tap=function(){var n=taps+1;setTaps(n);if(n>=5){setCoach(true);setTaps(0);}};
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{textAlign:"center",marginBottom:40}}>
        <div onClick={tap} style={{fontFamily:"Georgia,serif",fontSize:34,fontStyle:"italic",color:C.accent,letterSpacing:2,cursor:"default",userSelect:"none"}}>DietDesign</div>
        <div style={{fontSize:13,color:C.light,marginTop:6}}>코칭 기록 시스템</div>
      </div>
      {loading?<div style={{color:C.light}}>불러오는 중...</div>:!coach?(
        <div style={{background:C.card,borderRadius:14,border:"1px solid "+C.border,padding:24,width:"100%",maxWidth:340}}>
          <div style={{fontWeight:700,fontSize:16,marginBottom:16}}>로그인</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>이름</div><KInput value={name} onChange={setName} placeholder="이름을 입력하세요"/></div>
            <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>PIN</div><KInput value={pin} onChange={setPin} placeholder="PIN 번호" type="password"/></div>
            {err&&<p style={{color:C.danger,fontSize:12}}>{err}</p>}
            <Btn full onClick={function(){onLogin("member",name,pin,setErr);}} style={{marginTop:4,padding:14}}>로그인</Btn>
          </div>
        </div>
      ):(
        <div style={{background:C.card,borderRadius:14,border:"1px solid "+C.border,padding:24,width:"100%",maxWidth:340}}>
          <button onClick={function(){setCoach(false);}} style={{background:"none",border:"none",cursor:"pointer",color:C.mid,fontSize:13,marginBottom:16,padding:0}}>← 뒤로</button>
          <div style={{fontWeight:700,fontSize:16,marginBottom:16}}>코치 접속</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div><div style={{fontSize:12,color:C.mid,marginBottom:4}}>비밀번호</div><KInput value={cpw} onChange={setCpw} placeholder="코치 비밀번호" type="password"/></div>
            {cerr&&<p style={{color:C.danger,fontSize:12}}>{cerr}</p>}
            <Btn full onClick={function(){cpw===COACH_PW?onLogin("coach"):setCerr("비밀번호가 올바르지 않습니다.");}} style={{marginTop:4,padding:14}}>접속</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [members,setMembers]=useState([]);
  const [session,setSession]=useState(null);
  const [memberRecords,setMemberRecords]=useState({});
  const [allRecords,setAllRecords]=useState({});
  const [loading,setLoading]=useState(true);
  const [apiKey,setApiKey]=useState(function(){return localStorage.getItem("dd_apikey")||"";});
  const [geminiModel,setGeminiModel]=useState(function(){return localStorage.getItem("dd_model")||DEFAULT_MODEL;});
  const [coachPrompt,setCoachPrompt]=useState(DEFAULT_PROMPT);

  useEffect(function(){apiLoadMembers().then(function(m){setMembers(m);setLoading(false);});},[]);

  var handleLogin=async function(role,name,pin,setErr){
    if(role==="coach"){
      setSession({role:"coach"});
      var ms=await apiLoadMembers();
      setMembers(ms);
      var recs=await apiLoadAllRecords(ms.map(function(m){return m.id;}));
      setAllRecords(recs);
      return;
    }
    var m=members.find(function(m){return m.name===name&&m.pin===pin;});
    if(!m){if(setErr)setErr("이름 또는 PIN이 올바르지 않습니다.");return;}
    var recs=await apiLoadRecords(m.id);
    setMemberRecords(recs);
    setSession({role:"member",member:m});
  };

  var saveMyRecord=async function(date,rec){
    await apiSaveRecord(session.member.id,date,rec);
    setMemberRecords(function(p){return Object.assign({},p,{[date]:rec});});
  };

  if(!session)return<Login onLogin={handleLogin} loading={loading}/>;
  var curMember=session.role==="member"?members.find(function(m){return m.id===session.member.id;}):null;
  var isCoach=session.role==="coach";

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <div style={{background:C.card,borderBottom:"1px solid "+C.border,position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:isCoach?1200:720,margin:"0 auto",padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontFamily:"Georgia,serif",fontSize:20,fontStyle:"italic",color:C.accent,letterSpacing:1}}>DietDesign</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {!isCoach&&<span style={{fontSize:13,color:C.mid}}>{curMember&&curMember.name}님</span>}
            {isCoach&&<Tag>코치</Tag>}
            <Btn size="sm" variant="ghost" onClick={function(){setSession(null);}}>로그아웃</Btn>
          </div>
        </div>
      </div>
      <div style={{maxWidth:isCoach?1200:720,margin:"0 auto",padding:"24px 20px 60px"}}>
        {!isCoach&&curMember&&<MemberHome member={curMember} records={memberRecords} onSave={saveMyRecord}/>}
        {isCoach&&<CoachDashboard members={members} setMembers={setMembers} allRecords={allRecords} setAllRecords={setAllRecords} apiKey={apiKey} setApiKey={setApiKey} geminiModel={geminiModel} setGeminiModel={setGeminiModel} coachPrompt={coachPrompt} setCoachPrompt={setCoachPrompt}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
